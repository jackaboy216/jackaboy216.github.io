<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redline Rebels</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #fff;
      font-family: 'Roboto', sans-serif;
    }

    .navbar {
      background-color: #111;
      border: none;
    }

    .navbar-brand {
      color: #ff1e1e !important;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
      font-size: 1.8em;
    }

    .navbar-nav>li>a {
      color: #fff !important;
      font-weight: 500;
    }

    .navbar-nav>li>a:hover {
      color: #ff1e1e !important;
    }

    header {
      background: url('images/crew-banner.jpg') center center/cover no-repeat;
      text-align: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
      color: #ff1e1e;
    }

    header p {
      font-size: 1.2rem;
      color: #ddd;
    }

    .btn-redline {
      background-color: #ff1e1e;
      color: #fff;
      border: none;
    }

    .btn-redline:hover {
      background-color: #ff4d4d;
    }

    .section-heading {
      font-family: 'Bebas Neue', sans-serif;
      color: #ff1e1e;
      letter-spacing: 1px;
    }

    .content {
      padding: 80px 0;
      background-color: #141414;
    }

    .content-2 {
      background-color: #1a1a1a;
    }

    footer {
      background-color: #111;
      color: #777;
      padding: 30px 0;
      text-align: center;
    }

    footer p {
      margin: 0;
    }

    .promo-item {
      background-size: cover;
      background-position: center;
      text-align: center;
      color: white;
      height: 250px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2em;
      font-family: 'Bebas Neue', sans-serif;
      transition: 0.3s ease;
    }

    .promo-item:hover {
      transform: scale(1.05);
    }

    .item-1 {
      background-image: url('images/launch.jpg');
    }

    .item-2 {
      background-image: url('images/meets.jpg');
    }

    .item-3 {
      background-image: url('images/nightrun.jpg');
    }

   .logo-glow {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 6rem;
  letter-spacing: 3px;
  text-align: center;
  user-select: none;
  transition: all 0.4s ease-in-out;
}

.red-part {
  color: #ff1e1e;
  transition: all 0.3s ease;
}

.gold-part {
  color: #ffd700;
  transition: all 0.3s ease;
}

@media (max-width: 767px) {
  .navbar-collapse ul.nav {
    text-align: center;      /* center text on mobile */
    float: none !important;  /* remove default float */
  }

  .navbar-collapse ul.nav li {
    display: block;          /* make each item full width */
    margin: 10px 0;          /* optional spacing */
  }
}



  </style>
</head>

<body>
  <nav class="navbar navbar-default navbar-fixed-top">
  <div class="container">
    <div class="navbar-header">
      <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar"
        aria-expanded="false">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
      <a class="navbar-brand" href="#">
        <span class="red-part">REDLINE</span>
        <span class="gold-part">REBELS</span>
      </a>
    </div>

    <div class="collapse navbar-collapse" id="navbar">
      <ul class="nav navbar-nav navbar-right">
      <li class="active"><a href="index.html">Home</a></li>
      <li><a href="crew.html">Crew</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="join.html">Join</a></li>
</ul>
    </div>
  </div>
</nav>

<section class="content">
  <div class="container text-center">
    <h2 class="section-heading">Join the Crew</h2>

    <form style="max-width:500px;margin:auto;">
      <input type="text" class="form-control" placeholder="Name"><br>
      <input type="text" class="form-control" placeholder="Car"><br>
      <input type="text" class="form-control" placeholder="Instagram"><br>
      <textarea class="form-control" placeholder="Why do you want to join?"></textarea><br>
      <button class="btn btn-redline">Submit</button>
    </form>

  </div>
</section>



  <footer>
    <p>&copy; 2025 Redline Rebels | Built with Spark and Fuel</p>
  </footer>

  <script src="js/jquery-1.11.3.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
</body>

</html>
